        function createPopupContent(adherent) {
            var nom = (adherent.prenom || "") + " " + (adherent.nom || "");
            var bateau = adherent.bateau || "Non renseigné";
            var type = adherent.type || "";
            var tel = adherent.telephone || "";
            var email = adherent.email || "";
            
            var html = "<div class=\"popup-header\">";
            html += "<div class=\"popup-name\">" + nom + "</div>";
            html += "<div class=\"popup-boat\">⛵ " + bateau + (type ? " (" + type + ")" : "") + "</div>";
            html += "</div>";
            
            if (tel || email) {
                html += "<div class=\"popup-contact\">";
                if (tel) html += "<div class=\"contact-item\">📞 <a href=\"tel:" + tel + "\">" + tel + "</a></div>";
                if (email) html += "<div class=\"contact-item\">📧 <a href=\"mailto:" + email + "\">" + email + "</a></div>";
                html += "</div>";
            }
            
            return html;
        }
        
        var markers = [];
        adherentsData.forEach(function(portData) {
            var markerIcon = L.divIcon({
                className: "cluster-icon",
                html: "<div style=\"width: 40px; height: 40px; line-height: 34px;\">" + portData.adherents.length + "</div>",
                iconSize: [40, 40]
            });
            
            var marker = L.marker([portData.lat, portData.lon], { icon: markerIcon }).addTo(map);
            
            var popupContent = "<div style=\"max-height: 400px; overflow-y: auto;\">";
            popupContent += "<h3 style=\"color: #667eea; margin-bottom: 15px;\">📍 " + portData.port + "</h3>";
            popupContent += "<p style=\"color: #6c757d; margin-bottom: 15px;\">" + portData.adherents.length + " adhérent(s)</p>";
            
            portData.adherents.forEach(function(adh, idx) {
                if (idx > 0) popupContent += "<hr style=\"margin: 15px 0; border: 0; border-top: 1px solid #e9ecef;\">";
                popupContent += createPopupContent(adh);
            });
            
            popupContent += "</div>";
            
            marker.bindPopup(popupContent, { maxWidth: 350 });
            markers.push(marker);
        });
        
        if (markers.length > 0) {
            var group = L.featureGroup(markers);
            map.fitBounds(group.getBounds().pad(0.1));
        }
